<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Вход — TokenVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">TokenVault</span>
    </div>

    <div class="card">
        <h1 class="card-title">Вход в систему</h1>

        <div th:if="${param.error}" class="alert alert-error">
            Неверный логин или пароль.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            Вы успешно вышли из системы.
        </div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Логин</label>
                <input id="username" name="username" type="text" placeholder="Введите логин" required/>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input id="password" name="password" type="password" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Войти</button>
        </form>

        <div class="divider"><span>или войти через</span></div>

        <div class="oauth-buttons">
            <a th:href="@{/oauth2/authorization/google}" class="btn-oauth btn-google">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                          fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                          fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                          fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                          fill="#EA4335"/>
                </svg>
                Google
            </a>
            <a th:href="@{/oauth2/authorization/yandex}" class="btn-oauth btn-yandex">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10S2 17.523 2 12zm11.5-6h-1.75C10.284 6 9 7.343 9 9c0 1.38.82 2.5 2 3l-2.5 6h2l2.5-6H14v6h1.5V6H13.5zm0 5.5V7.5h.5c.828 0 1.5.672 1.5 1.5s-.672 2-1.5 2h-.5z"/>
                </svg>
                Яндекс
            </a>
        </div>

        <p class="auth-footer">Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a></p>
    </div>
</div>
</body>
</html>
