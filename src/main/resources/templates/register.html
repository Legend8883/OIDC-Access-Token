<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Регистрация — TokenVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">TokenVault</span>
    </div>

    <div class="card">
        <h1 class="card-title">Регистрация</h1>

        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post" th:object="${registrationRequest}">
            <div class="form-group">
                <label for="username">Логин</label>
                <input id="username" th:field="*{username}" type="text" placeholder="минимум 3 символа" required/>
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" th:field="*{email}" type="email" placeholder="you@example.com" required/>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input id="password" th:field="*{password}" type="password" placeholder="минимум 6 символов" required/>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
        </form>

        <p class="auth-footer">Уже есть аккаунт? <a th:href="@{/login}">Войти</a></p>
    </div>
</div>
</body>
</html>
